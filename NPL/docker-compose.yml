services:
  vault-ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vault-ai-service
    ports:
      - "8006:8006"
    volumes:
      - ./models:/app/models
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
